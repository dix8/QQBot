name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: notes
        run: |
          # 找到上一个 tag（如果有）
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          echo "Previous tag: ${PREV_TAG:-none}"

          # 获取所有提交信息
          ALL=$(git log "$RANGE" --pretty=format:"%h|%s")

          FEAT=""
          FIX=""
          REFACTOR=""
          PERF=""
          DEPRECATE=""
          REMOVE=""
          CHORE=""
          OTHER=""

          while IFS='|' read -r hash subject; do
            [ -z "$hash" ] && continue
            line="- ${subject} (${hash})"
            case "$subject" in
              feat:*|feat\(*) FEAT="${FEAT}${line}\n" ;;
              fix:*|fix\(*) FIX="${FIX}${line}\n" ;;
              refactor:*|refactor\(*) REFACTOR="${REFACTOR}${line}\n" ;;
              perf:*|perf\(*) PERF="${PERF}${line}\n" ;;
              deprecate:*|deprecate\(*) DEPRECATE="${DEPRECATE}${line}\n" ;;
              remove:*|remove\(*|delete:*|delete\(*) REMOVE="${REMOVE}${line}\n" ;;
              chore:*|chore\(*|ci:*|ci\(*|build:*|build\(*|docs:*|docs\(*) CHORE="${CHORE}${line}\n" ;;
              *) OTHER="${OTHER}${line}\n" ;;
            esac
          done <<< "$ALL"

          # 组装 Release Notes
          NOTES=""
          [ -n "$FEAT" ] && NOTES="${NOTES}## 🚀 Features\n\n${FEAT}\n"
          [ -n "$FIX" ] && NOTES="${NOTES}## 🐛 Bug Fixes\n\n${FIX}\n"
          [ -n "$REFACTOR" ] && NOTES="${NOTES}## ♻️ Refactor\n\n${REFACTOR}\n"
          [ -n "$PERF" ] && NOTES="${NOTES}## ⚡ Performance\n\n${PERF}\n"
          [ -n "$DEPRECATE" ] && NOTES="${NOTES}## ⚠️ Deprecated\n\n${DEPRECATE}\n"
          [ -n "$REMOVE" ] && NOTES="${NOTES}## 🗑️ Removed\n\n${REMOVE}\n"
          [ -n "$CHORE" ] && NOTES="${NOTES}## 📦 Chores\n\n${CHORE}\n"
          [ -n "$OTHER" ] && NOTES="${NOTES}## 📝 Other Changes\n\n${OTHER}\n"

          if [ -n "$PREV_TAG" ]; then
            NOTES="${NOTES}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
          else
            NOTES="${NOTES}**Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}"
          fi

          # 写入文件避免转义问题
          echo -e "$NOTES" > release_notes.md

      - name: Create Release
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
