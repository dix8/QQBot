name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: notes
        run: |
          # 找到上一个 tag（如果有）
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          echo "Previous tag: ${PREV_TAG:-none}"

          # 按前缀分类提取提交
          FEAT=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^feat" --extended-regexp)
          FIX=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^fix" --extended-regexp)
          REFACTOR=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^refactor" --extended-regexp)
          PERF=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^perf" --extended-regexp)
          DEPRECATE=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^deprecate" --extended-regexp)
          REMOVE=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^remove\|^delete" --extended-regexp)
          CHORE=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^chore\|^ci\|^build\|^docs" --extended-regexp)

          # 收集已分类的提交 hash
          CLASSIFIED=$(git log "$RANGE" --pretty=format:"%h" --grep="^feat\|^fix\|^refactor\|^perf\|^deprecate\|^remove\|^delete\|^chore\|^ci\|^build\|^docs" --extended-regexp)
          # 获取所有提交
          ALL_HASHES=$(git log "$RANGE" --pretty=format:"%h")
          # 筛选未分类的提交
          OTHER=""
          for hash in $ALL_HASHES; do
            if ! echo "$CLASSIFIED" | grep -q "$hash"; then
              MSG=$(git log -1 --pretty=format:"- %s (%h)" "$hash")
              OTHER="${OTHER}${MSG}\n"
            fi
          done

          # 组装 Release Notes
          NOTES=""
          [ -n "$FEAT" ] && NOTES="${NOTES}## 🚀 Features\n\n${FEAT}\n\n"
          [ -n "$FIX" ] && NOTES="${NOTES}## 🐛 Bug Fixes\n\n${FIX}\n\n"
          [ -n "$REFACTOR" ] && NOTES="${NOTES}## ♻️ Refactor\n\n${REFACTOR}\n\n"
          [ -n "$PERF" ] && NOTES="${NOTES}## ⚡ Performance\n\n${PERF}\n\n"
          [ -n "$DEPRECATE" ] && NOTES="${NOTES}## ⚠️ Deprecated\n\n${DEPRECATE}\n\n"
          [ -n "$REMOVE" ] && NOTES="${NOTES}## 🗑️ Removed\n\n${REMOVE}\n\n"
          [ -n "$CHORE" ] && NOTES="${NOTES}## 📦 Chores\n\n${CHORE}\n\n"
          [ -n "$OTHER" ] && NOTES="${NOTES}## 📝 Other Changes\n\n${OTHER}\n"

          if [ -n "$PREV_TAG" ]; then
            NOTES="${NOTES}\n**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}"
          else
            NOTES="${NOTES}\n**Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}"
          fi

          # 写入文件避免转义问题
          echo -e "$NOTES" > release_notes.md

      - name: Create Release
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
