name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，例如 1.0.0 或 1.0.0-beta）'
        required: true
        type: string

permissions:
  contents: write
  # packages: write  # 启用 GHCR 推送时取消注释

jobs:
  # ── Windows 便携包构建 ──────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            web/pnpm-lock.yaml
            server/pnpm-lock.yaml

      - name: Build portable package
        shell: bash
        run: bash scripts/build-win.sh

      - name: Create zip
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          cd release
          7z a -tzip "../QQBot-${VERSION}-windows-x64.zip" QQBot/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: QQBot-*-windows-x64.zip

  # ── Docker 镜像构建 & 推送到 GHCR（暂未启用）────
