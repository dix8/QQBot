  #       with:
  #         registry: ${{ env.REGISTRY }}
  #         username: ${{ github.actor }}
  #         password: ${{ secrets.GITHUB_TOKEN }}
  #
  #     - name: Extract metadata
  #       id: meta
  #       uses: docker/metadata-action@v5
  #       with:
  #         images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
  #         tags: |
  #           type=semver,pattern={{version}}
  #           type=semver,pattern={{major}}.{{minor}}
  #           type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
  #           type=raw,value=latest
  #
  #     - name: Build and push Docker image
  #       uses: docker/build-push-action@v6
  #       with:
  #         context: .
  #         push: true
  #         tags: ${{ steps.meta.outputs.tags }}
  #         labels: ${{ steps.meta.outputs.labels }}

  # ── 创建 GitHub Release ────────────────────────
  create-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: notes
        run: |
          TAG="${{ inputs.version != '' && format('v{0}', inputs.version) || github.ref_name }}"

          # 找到上一个 tag（如果有）
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          echo "Previous tag: ${PREV_TAG:-none}"

          # 获取所有提交信息
          ALL=$(git log "$RANGE" --pretty=format:"%h|%s")

          FEAT=""
          FIX=""
          REFACTOR=""
          PERF=""
          DEPRECATE=""
          REMOVE=""
          CHORE=""
          OTHER=""

          while IFS='|' read -r hash subject; do
            [ -z "$hash" ] && continue
            line="- ${subject} (${hash})"
            case "$subject" in
              feat:*|feat\(*) FEAT="${FEAT}${line}\n" ;;
              fix:*|fix\(*) FIX="${FIX}${line}\n" ;;
              refactor:*|refactor\(*) REFACTOR="${REFACTOR}${line}\n" ;;
              perf:*|perf\(*) PERF="${PERF}${line}\n" ;;
              deprecate:*|deprecate\(*) DEPRECATE="${DEPRECATE}${line}\n" ;;
              remove:*|remove\(*|delete:*|delete\(*) REMOVE="${REMOVE}${line}\n" ;;
              chore:*|chore\(*|ci:*|ci\(*|build:*|build\(*|docs:*|docs\(*) CHORE="${CHORE}${line}\n" ;;
              *) OTHER="${OTHER}${line}\n" ;;
            esac
          done <<< "$ALL"

          # 组装 Release Notes
          NOTES=""
          [ -n "$FEAT" ] && NOTES="${NOTES}## 🚀 Features\n\n${FEAT}\n"
          [ -n "$FIX" ] && NOTES="${NOTES}## 🐛 Bug Fixes\n\n${FIX}\n"
          [ -n "$REFACTOR" ] && NOTES="${NOTES}## ♻️ Refactor\n\n${REFACTOR}\n"
          [ -n "$PERF" ] && NOTES="${NOTES}## ⚡ Performance\n\n${PERF}\n"
          [ -n "$DEPRECATE" ] && NOTES="${NOTES}## ⚠️ Deprecated\n\n${DEPRECATE}\n"
          [ -n "$REMOVE" ] && NOTES="${NOTES}## 🗑️ Removed\n\n${REMOVE}\n"
          [ -n "$CHORE" ] && NOTES="${NOTES}## 📦 Chores\n\n${CHORE}\n"
          [ -n "$OTHER" ] && NOTES="${NOTES}## 📝 Other Changes\n\n${OTHER}\n"

          if [ -n "$PREV_TAG" ]; then
            NOTES="${NOTES}**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          else
            NOTES="${NOTES}**Full Changelog**: https://github.com/${{ github.repository }}/commits/${TAG}"
          fi

          # 写入文件避免转义问题
          echo -e "$NOTES" > release_notes.md

      - uses: actions/download-artifact@v4
        with:
          name: windows-portable

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(inputs.version || github.ref_name, '-') }}
          files: QQBot-*-windows-x64.zip
